version: "3.9"

services:
  backend:
    build:
      context: ./backend
    expose:
      - "4000"
    environment:
      PORT: 4000
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - entrenamiento_net

  frontend:
    build:
      context: ./frontend-web
    expose:
      - "5173"
    environment:
      VITE_API_BASE: "/api"
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - entrenamiento_net

  nginx:
    image: nginx:alpine
    container_name: hostelcheckin-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - entrenamiento_net

networks:
  entrenamiento_net:
    driver: bridge