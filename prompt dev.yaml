

Arquitectura actual del proyecto que debes respetar:

Proyecto dividido en:
- backend/
- frontend-web/

Backend:
- Express modular por feature
- Cada módulo usa controller / routes / service según aplique
- Módulos actuales: admin, checkin, mcp, nobeds, payments, tra
- TTLock/MCP vive en backend/src/mcp con mcp.controller.js, mcp.routes.js, mcpRouter.js, ttlock.service.js y ttlockAdapter.js
- Utilidades compartidas en backend/src/utils
- Prisma centralizado en backend/src/utils/prismaClient.js
- No cambiar arquitectura backend salvo que yo lo pida

Frontend:
- React + TypeScript
- Arquitectura modular por feature
- El módulo admin vive en frontend-web/src/pages/admin
- Dentro de admin ya existe separación por:
  - components/
  - hooks/
  - modals/
  - admin.api.ts
  - admin.styles.ts
  - admin.types.ts
  - admin.utils.ts
  - AdminDashboard.tsx
- Hooks actuales:
  - useAdminAuth.ts
  - useAdminDashboard.ts
- Modals actuales:
  - GuestDetailModal.tsx
  - TtlockModal.tsx
- Componentes actuales:
  - AdminToolbar.tsx
  - GuestsTable.tsx
  - LoginView.tsx
  - MetricsPanel.tsx
  - SmartImage.tsx

Objetivo:
- marcar visualmente las cerraduras ya asignadas
- validar cuáles no fueron asignadas
- permitir mover al huésped a otra cerradura
- conservar el mismo PIN
- evitar duplicados
- devolver respuesta clara por cerradura asignada / no asignada
- debe traer la cerradura tanto el servicio que consulta la base de datos y directamente tambien del ttlock asociada al codigo asignado

Reglas para trabajar:
- reutiliza esta misma arquitectura
- no muevas archivos de lugar
- no conviertas todo otra vez en un solo archivo gigante
- no inventes nuevos archivos si no son estrictamente necesarios
- si necesitas tocar backend y frontend, sepáralos por archivo
- dame siempre código completo listo para copiar y pegar
- explica primero qué archivos vas a tocar y por qué
- no alucines rutas, tipos ni endpoints




